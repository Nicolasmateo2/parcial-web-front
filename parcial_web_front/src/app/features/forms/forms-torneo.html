<section class="torneo-formulario">
	<h2>Formulario del torneo</h2>

	<form>
		<div>
			<label for="nombre">Nombre del torneo</label>
			<input id="nombre" name="nombre" type="text" placeholder="Ej. Copa Universitaria" />
		</div>

		<div>
			<label for="deporte">Deporte</label>
			<select id="deporte" name="deporte">
				<option value="">Seleccione una opción</option>
				<option value="futbol">Fútbol</option>
				<option value="baloncesto">Baloncesto</option>
				<option value="voleibol">Voleibol</option>
				<option value="tenis">Tenis</option>
			</select>
		</div>

		<div>
			<label for="fechaInicio">Fecha de inicio</label>
			<input id="fechaInicio" name="fechaInicio" type="date" />
		</div>

		<div>
			<label for="fechaFin">Fecha de fin</label>
			<input id="fechaFin" name="fechaFin" type="date" />
		</div>

		<div>
			<label for="sede">Sede</label>
			<input id="sede" name="sede" type="text" placeholder="Lugar del torneo" />
		</div>

		<div>
			<label for="equipos">Número de equipos</label>
			<input id="equipos" name="equipos" type="number" min="2" placeholder="8" />
		</div>

		<div>
			<label for="descripcion">Descripción</label>
			<textarea id="descripcion" name="descripcion" rows="4" placeholder="Detalles del torneo"></textarea>
		</div>

		<button type="submit">Guardar torneo</button>
	</form>
</section>
